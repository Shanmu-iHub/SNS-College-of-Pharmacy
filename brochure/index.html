<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../images/Favicon%20-%20Pharmacy.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Brochure | SNS College of Pharmacy and Health Sciences</title>
    <meta name="description"
        content="SNS College of Pharmacy and Health Sciences (SNSCPHS) - India's first Design Thinking Pharmacy college in Coimbatore. Explore our Digital Brochure.">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background-color: #058D7A;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .back-button:hover {
            transform: translateY(-2px);
            background-color: #047a69;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        /* Mobile adjustment for back button */
        @media (max-width: 640px) {
            .back-button {
                top: 15px;
                left: 15px;
                padding: 10px 18px;
                font-size: 12px;
            }
        }
    </style>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <a href="/" class="back-button">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Website</span>
    </a>
    <iframe 
        src="/brochure" 
        title="SNS Institutions Digital Brochure 2025"
        allowfullscreen="true" 
        webkitallowfullscreen="true" 
        mozallowfullscreen="true">
    </iframe>
</body>
</html>
